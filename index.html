<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2026 AI — лекция</title>
<style>
  :root{
    --bg:#0f1115; --bg2:#151823; --panel:#1b1f2e;
    --ink:#e8eaf0; --muted:#9aa3b8; --line:#2a3042;
    --accent:#6ea8fe; --accent2:#8b7cff; --good:#3ddc97; --warn:#f5c451;
    --maxw:980px;
  }
  *{box-sizing:border-box}
  html,body{height:100%}
  body{
    margin:0; background:var(--bg); color:var(--ink);
    font-family:"Segoe UI",-apple-system,system-ui,Roboto,Arial,sans-serif;
    font-size:16px; -webkit-font-smoothing:antialiased; overflow:hidden;
  }
  /* progress */
  #progress{position:fixed;top:0;left:0;height:3px;background:linear-gradient(90deg,var(--accent),var(--accent2));width:0;z-index:50;transition:width .25s ease}
  /* stage */
  #stage{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;padding:4.2rem 3rem 4.6rem}
  .slide{width:100%;max-width:var(--maxw);max-height:100%;overflow:auto;animation:fade .35s ease}
  .slide::-webkit-scrollbar{width:8px}
  .slide::-webkit-scrollbar-thumb{background:var(--line);border-radius:8px}
  @keyframes fade{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}

  .kicker{color:var(--accent);font-weight:600;letter-spacing:.06em;text-transform:uppercase;font-size:.82rem;margin-bottom:1rem}
  h1.title{font-size:4.6rem;line-height:1.02;margin:0 0 1.1rem;letter-spacing:-.02em;
    background:linear-gradient(120deg,#fff,#9ab6ff);-webkit-background-clip:text;background-clip:text;color:transparent}
  .subtitle{font-size:1.5rem;color:var(--muted);font-weight:400;max-width:760px;line-height:1.35}
  .titlemeta{margin-top:2.4rem;color:var(--muted);font-size:.92rem;border-top:1px solid var(--line);padding-top:1.1rem;display:inline-block}

  /* section divider */
  .secnum{font-size:7rem;font-weight:800;color:transparent;-webkit-text-stroke:2px var(--accent2);line-height:1;opacity:.85}
  .sectitle{font-size:3rem;line-height:1.06;margin:.6rem 0 1rem;letter-spacing:-.02em;max-width:880px}
  .secsub{font-size:1.35rem;color:var(--muted);max-width:760px;line-height:1.4}

  /* content */
  .tag{display:inline-block;font-size:.78rem;font-weight:600;color:var(--accent2);
    border:1px solid var(--line);border-radius:999px;padding:.25rem .8rem;margin-bottom:1rem;letter-spacing:.03em}
  h2.h{font-size:2.5rem;line-height:1.1;margin:0 0 1.5rem;letter-spacing:-.02em}
  ul.b{list-style:none;margin:0;padding:0;display:flex;flex-direction:column;gap:.95rem}
  ul.b li{position:relative;padding-left:1.7rem;font-size:1.22rem;line-height:1.45;color:#d7dbe7}
  ul.b li::before{content:"";position:absolute;left:0;top:.62em;width:.6rem;height:.6rem;border-radius:2px;
    background:linear-gradient(135deg,var(--accent),var(--accent2))}
  ul.b li strong{color:#fff;font-weight:650}

  .callout{margin-top:1.5rem;background:rgba(245,196,81,.08);border:1px solid rgba(245,196,81,.35);
    border-left:4px solid var(--warn);border-radius:8px;padding:.85rem 1.1rem;color:#f0d79a;font-size:1.02rem;line-height:1.4}
  .callout b{color:var(--warn)}

  pre{margin:1.4rem 0 0;background:#0b0d13;border:1px solid var(--line);border-radius:10px;
    padding:1.1rem 1.3rem;overflow:auto;font-size:1.02rem;line-height:1.5;
    font-family:"Cascadia Code",Consolas,"Courier New",monospace;color:#cfe3ff}
  pre .c{color:#5f6b85}

  table{border-collapse:collapse;width:100%;margin-top:.4rem;font-size:1.05rem}
  th,td{text-align:left;padding:.6rem .8rem;border-bottom:1px solid var(--line);vertical-align:top}
  th{color:var(--accent);font-weight:600;font-size:.9rem;text-transform:uppercase;letter-spacing:.04em}
  td:first-child{color:#fff;font-weight:600;white-space:nowrap}
  tr:hover td{background:rgba(110,168,254,.05)}

  /* footer bar */
  #bar{position:fixed;left:0;right:0;bottom:0;height:3rem;display:flex;align-items:center;
    gap:1rem;padding:0 1.2rem;background:rgba(13,15,20,.82);backdrop-filter:blur(8px);
    border-top:1px solid var(--line);font-size:.85rem;color:var(--muted);z-index:40}
  #bar .seclabel{color:var(--ink);font-weight:600}
  #bar .spacer{flex:1}
  #bar button{background:transparent;border:1px solid var(--line);color:var(--muted);
    border-radius:7px;padding:.3rem .7rem;cursor:pointer;font-size:.82rem;transition:.15s}
  #bar button:hover{color:var(--ink);border-color:var(--accent)}
  #counter{font-variant-numeric:tabular-nums}

  /* speaker notes */
  #notes{position:fixed;left:0;right:0;bottom:3rem;max-height:38vh;overflow:auto;
    background:rgba(20,23,34,.97);border-top:2px solid var(--accent);padding:1.1rem 1.4rem;
    transform:translateY(110%);transition:transform .25s ease;z-index:45}
  #notes.open{transform:none}
  #notes .lbl{color:var(--accent);font-size:.78rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;margin-bottom:.4rem}
  #notes .txt{font-size:1.08rem;line-height:1.5;color:#dfe3ee;max-width:var(--maxw)}
  #notes .empty{color:var(--muted);font-style:italic}

  /* overview / map */
  #map{position:fixed;inset:0;background:rgba(8,9,13,.97);z-index:60;display:none;
    padding:3rem;overflow:auto}
  #map.open{display:block}
  #map h3{font-size:1.4rem;margin:0 0 1.6rem;color:var(--muted);font-weight:500}
  .mapgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:.7rem;max-width:1100px}
  .mapitem{border:1px solid var(--line);border-radius:9px;padding:.8rem 1rem;cursor:pointer;transition:.15s;background:var(--panel)}
  .mapitem:hover{border-color:var(--accent);transform:translateY(-2px)}
  .mapitem.sec{background:linear-gradient(120deg,rgba(110,168,254,.12),rgba(139,124,255,.12));border-color:var(--accent2)}
  .mapitem .mi-sec{font-size:.72rem;color:var(--accent);text-transform:uppercase;letter-spacing:.05em}
  .mapitem .mi-title{font-size:.98rem;margin-top:.25rem;line-height:1.25;color:var(--ink)}
  #map .close{position:fixed;top:1.4rem;right:1.8rem;font-size:1rem;color:var(--muted);cursor:pointer;border:1px solid var(--line);border-radius:7px;padding:.4rem .8rem}

  /* books */
  .booksintro{font-size:1.15rem;color:var(--muted);margin:0 0 1.4rem;line-height:1.4}
  .books{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:1.2rem}
  .book{display:flex;flex-direction:column;background:var(--panel);border:1px solid var(--line);
    border-radius:10px;overflow:hidden;transition:.15s}
  .book:hover{border-color:var(--accent);transform:translateY(-3px)}
  .book .cov{width:100%;aspect-ratio:2/3;object-fit:cover;background:#0b0d13;display:block;border-bottom:1px solid var(--line)}
  .book .meta{padding:.7rem .8rem 0.9rem}
  .book .bt{font-size:.98rem;font-weight:650;line-height:1.2;color:#fff}
  .book .ba{font-size:.82rem;color:var(--accent);margin-top:.2rem}
  .book .bn{font-size:.82rem;color:var(--muted);margin-top:.5rem;line-height:1.35}
  .hint{position:fixed;bottom:3.6rem;right:1.2rem;color:var(--muted);font-size:.78rem;opacity:.6;z-index:30}
  @media(max-width:760px){
    #stage{padding:3.4rem 1.2rem 4rem}
    h1.title{font-size:2.8rem}.subtitle{font-size:1.15rem}
    h2.h{font-size:1.7rem}ul.b li{font-size:1.05rem}
    .sectitle{font-size:2rem}.secnum{font-size:4.5rem}
    table{font-size:.92rem}
  }
</style>
</head>
<body>
  <div id="progress"></div>
  <div id="stage"><div class="slide" id="slide"></div></div>

  <div id="notes"><div class="lbl">Реплика спикера</div><div class="txt" id="notesTxt"></div></div>

  <div id="bar">
    <span class="seclabel" id="secLabel"></span>
    <span class="spacer"></span>
    <button onclick="toggleNotes()" title="N">Заметки</button>
    <button onclick="openMap()" title="O">Разделы</button>
    <span id="counter"></span>
  </div>

  <div id="map">
    <span class="close" onclick="closeMap()">✕ закрыть (Esc)</span>
    <h3>Карта презентации — кликните, чтобы перейти</h3>
    <div class="mapgrid" id="mapGrid"></div>
  </div>

  <div class="hint">← → навигация · N заметки · O карта</div>

  <script src="slides.js"></script>
  <script>
    let i = 0;
    const stage = document.getElementById('slide');
    const esc = s => String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    const md  = s => esc(s).replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>');

    function render(){
      const s = SLIDES[i];
      let h = '';
      if(s.kind === 'title'){
        h += s.kicker ? `<div class="kicker">${esc(s.kicker)}</div>`:'';
        h += `<h1 class="title">${esc(s.title)}</h1>`;
        h += s.subtitle ? `<div class="subtitle">${esc(s.subtitle)}</div>`:'';
        h += s.meta ? `<div class="titlemeta">${esc(s.meta)}</div>`:'';
      } else if(s.kind === 'section'){
        h += `<div class="secnum">${esc(s.num||'')}</div>`;
        h += `<div class="sectitle">${esc(s.title)}</div>`;
        h += s.subtitle ? `<div class="secsub">${esc(s.subtitle)}</div>`:'';
      } else if(s.kind === 'books'){
        h += `<h2 class="h">${md(s.title)}</h2>`;
        h += s.intro ? `<div class="booksintro">${esc(s.intro)}</div>`:'';
        h += '<div class="books">';
        s.books.forEach(b=>{
          h += '<div class="book">';
          h += `<img class="cov" src="${esc(b.cover)}" alt="${esc(b.title)}" loading="lazy">`;
          h += '<div class="meta">';
          h += `<div class="bt">${esc(b.title)}</div>`;
          h += `<div class="ba">${esc(b.author)}</div>`;
          h += b.note ? `<div class="bn">${esc(b.note)}</div>`:'';
          h += '</div></div>';
        });
        h += '</div>';
      } else {
        h += s.tag ? `<div class="tag">${esc(s.tag)}</div>`:'';
        h += `<h2 class="h">${md(s.title)}</h2>`;
        if(s.table){
          h += '<table><thead><tr>';
          s.table.headers.forEach(x=>h+=`<th>${esc(x)}</th>`);
          h += '</tr></thead><tbody>';
          s.table.rows.forEach(r=>{h+='<tr>';r.forEach(c=>h+=`<td>${esc(c)}</td>`);h+='</tr>';});
          h += '</tbody></table>';
        }
        if(s.bullets){
          h += '<ul class="b">';
          s.bullets.forEach(b=>h+=`<li>${md(b)}</li>`);
          h += '</ul>';
        }
        if(s.code){
          let t = esc(s.code.text).replace(/(--[^\n]*)/g,'<span class="c">$1</span>');
          h += `<pre>${t}</pre>`;
        }
        if(s.callout){
          h += `<div class="callout"><b>⚠ Уточнить у преподавателя:</b> ${esc(s.callout)}</div>`;
        }
      }
      stage.innerHTML = h;
      stage.parentElement.scrollTop = 0;
      document.getElementById('progress').style.width = ((i)/(SLIDES.length-1)*100)+'%';
      document.getElementById('counter').textContent = (i+1)+' / '+SLIDES.length;
      document.getElementById('secLabel').textContent = SECTIONS[s.sec] || '';
      // notes
      const nt = document.getElementById('notesTxt');
      if(s.note){ nt.innerHTML = esc(s.note); nt.classList.remove('empty'); }
      else { nt.innerHTML = 'Для этого слайда заметок нет.'; nt.classList.add('empty'); }
      location.hash = i;
    }
    function go(n){ i = Math.max(0, Math.min(SLIDES.length-1, n)); render(); }
    function next(){ go(i+1); } function prev(){ go(i-1); }
    function toggleNotes(){ document.getElementById('notes').classList.toggle('open'); }

    function openMap(){
      const g = document.getElementById('mapGrid'); g.innerHTML='';
      SLIDES.forEach((s,idx)=>{
        const div = document.createElement('div');
        const isSec = s.kind==='section'||s.kind==='title';
        div.className = 'mapitem'+(isSec?' sec':'');
        const title = s.title || s.subtitle || '—';
        div.innerHTML = `<div class="mi-sec">${esc(SECTIONS[s.sec]||'')}</div><div class="mi-title">${esc(title)}</div>`;
        div.onclick = ()=>{ closeMap(); go(idx); };
        g.appendChild(div);
      });
      document.getElementById('map').classList.add('open');
    }
    function closeMap(){ document.getElementById('map').classList.remove('open'); }

    document.addEventListener('keydown', e=>{
      if(document.getElementById('map').classList.contains('open')){
        if(e.key==='Escape') closeMap(); return;
      }
      switch(e.key){
        case 'ArrowRight': case ' ': case 'PageDown': next(); e.preventDefault(); break;
        case 'ArrowLeft': case 'PageUp': prev(); e.preventDefault(); break;
        case 'Home': go(0); break;
        case 'End': go(SLIDES.length-1); break;
        case 'n': case 'N': case 'т': case 'Т': toggleNotes(); break;
        case 'o': case 'O': case 'щ': case 'Щ': openMap(); break;
        case 'f': case 'F': case 'а': case 'А':
          if(!document.fullscreenElement) document.documentElement.requestFullscreen();
          else document.exitFullscreen(); break;
      }
    });
    // click navigation (right half = next, left = prev), ignore links/buttons
    document.getElementById('stage').addEventListener('click', e=>{
      const x = e.clientX / window.innerWidth;
      if(x > 0.5) next(); else prev();
    });

    const start = parseInt(location.hash.replace('#',''));
    if(!isNaN(start)) i = Math.max(0, Math.min(SLIDES.length-1, start));
    render();
  </script>
</body>
</html>
